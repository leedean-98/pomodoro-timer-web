<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro - 설정</title>
  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="setting.css" />
</head>
<body>
  <div class="container">
    <h3 class="setting-title">Setting</h3>

    <div class="setting-row">
      <label for="timer-minutes">타이머 시간 (분)</label>
      <input id="timer-minutes" type="number" min="1" max="60" value="25" />
    </div>

    <button class="btn btn-save" onclick="saveSettings()">설정 완료</button>
  </div>
  <script src="setting.js"></script>
</body>
</html>
