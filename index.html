<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="container">
    <h1 class="title">pomodoro</h1>

    <div class="timer">
      <span class="time">25:00</span>
    </div>

    <div class="controls">
      <button class="btn btn-start" onclick="startTimer()">시작</button>
      <button class="btn btn-stop" onclick="stopTimer()">정지</button>
      <button class="btn btn-reset" onclick="resetTimer()">초기화</button>
    </div>

    <button class="btn btn-settings" onclick="location.href='setting.html'">⚙ 설정</button>
  </div>
  <script src="index.js"></script>
</body>
</html>
